name: reproduce

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  source-data-and-figures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Reproduce
        run: make reproduce
      - name: Upload figures
        uses: actions/upload-artifact@v4
        with:
          name: reproduced-figures
          path: figures/
